<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Calculator</title>
<link rel="icon" href="/workspace/calculator/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Surface Hierarchy — Light (default) */
    --surface: #fbf9f6;
    --surface-container-low: #f1eeea;
    --surface-container: #e9e6e2;
    --surface-container-high: #dfdcd8;
    --surface-container-highest: #d2cfcb;
    --surface-bright: #cac7c3;

    /* Primary / Cobalt */
    --primary: #2e5bff;
    --primary-container: #2e5bff;
    --on-primary-container: #ffffff;
    --on-primary-fixed-variant: #0035be;
    --secondary-container: #343d96;

    /* Tertiary / Cyan */
    --tertiary: #0e8fa3;

    /* Text */
    --on-surface: #1a1c20;
    --on-surface-variant: #44464f;

    /* Outline */
    --outline: #74767e;
    --outline-variant: rgba(116, 118, 126, 0.18);

    /* Spacing */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;

    /* Ripple */
    --ripple: rgba(46, 91, 255, 0.10);

    /* Equals hover/active */
    --eq-hover-from: #2550e0;
    --eq-hover-to: #2d3580;
    --eq-active-from: #1c42c0;
    --eq-active-to: #252d70;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #10141a;
      --surface-container-low: #181c22;
      --surface-container: #1c2026;
      --surface-container-high: #262a30;
      --surface-container-highest: #31353c;
      --surface-bright: #353940;

      --primary: #7da1ff;
      --primary-container: #2e5bff;
      --on-primary-container: #efefff;
      --on-primary-fixed-variant: #0035be;
      --secondary-container: #343d96;

      --tertiary: #44d8f1;

      --on-surface: #dfe2eb;
      --on-surface-variant: #c4c5d9;

      --outline: #8e9099;
      --outline-variant: rgba(142, 144, 153, 0.15);

      --ripple: rgba(46, 91, 255, 0.12);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--surface);
    color: var(--on-surface);
    font-family: 'Manrope', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .calculator {
    width: 100%;
    max-width: 400px;
    height: 100dvh;
    padding: var(--space-md) var(--space-md) var(--space-lg);
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-sm) var(--space-xs);
  }

  .header-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--tertiary);
  }


  /* Display */
  .display {
    background: var(--surface-container-low);
    padding: var(--space-lg) var(--space-lg) var(--space-md);
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    gap: var(--space-sm);
    position: relative;
    overflow: hidden;
  }

  .display-expression {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--on-surface-variant);
    letter-spacing: 0.01em;
    min-height: 20px;
    text-align: right;
    word-break: break-all;
    width: 100%;
    position: relative;
  }

  .display-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--on-surface);
    letter-spacing: -0.02em;
    line-height: 1.05;
    text-align: right;
    word-break: break-all;
    width: 100%;
    position: relative;
    transition: font-size 150ms ease-in-out;
  }

  .display-value.shrink-1 { font-size: 40px; }
  .display-value.shrink-2 { font-size: 34px; }
  .display-value.shrink-3 { font-size: 28px; }

  /* Keypad */
  .keypad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: var(--space-sm);
    flex: 0 0 auto;
  }

  .key {
    border: none;
    background: var(--surface-container);
    color: var(--on-surface);
    font-family: 'Manrope', sans-serif;
    font-size: 22px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0ms, color 150ms ease-in-out;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    position: relative;
    padding: var(--space-md) 0;
    overflow: hidden;
  }

  .key:hover {
    background: var(--surface-bright);
  }

  .key:active {
    background: var(--surface-container-highest);
    transition-duration: 0ms;
  }

  /* Operator keys */
  .key-op {
    color: var(--primary);
    font-weight: 700;
    font-size: 24px;
    background: var(--surface-container-high);
  }

  .key-op:hover {
    background: var(--surface-bright);
  }

  /* Function keys (AC, +/-, %) */
  .key-fn {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--on-surface-variant);
    background: var(--surface-container-high);
  }

  .key-fn:hover {
    color: var(--on-surface);
    background: var(--surface-bright);
  }

  /* Equals key — cobalt gradient */
  .key-eq {
    background: linear-gradient(45deg, var(--primary-container), var(--secondary-container));
    color: var(--on-primary-container);
    font-weight: 700;
    font-size: 28px;
    position: relative;
  }


  .key-eq:hover {
    background: linear-gradient(45deg, var(--eq-hover-from), var(--eq-hover-to));
  }

  .key-eq:active {
    background: linear-gradient(45deg, var(--eq-active-from), var(--eq-active-to));
  }

  /* Zero key spans 2 columns */
  .key-zero {
    grid-column: span 2;
  }

  /* Decimal key */
  .key-dot {
    font-size: 28px;
    font-weight: 700;
  }

  /* Active operator indicator */
  .key-op.active {
    background: var(--primary-container);
    color: var(--on-primary-container);
  }

  /* Ripple effect */
  .key .ripple {
    position: absolute;
    background: var(--ripple);
    transform: scale(0);
    animation: rippleAnim 300ms ease-in-out forwards;
    pointer-events: none;
  }

  @keyframes rippleAnim {
    to {
      transform: scale(2.5);
      opacity: 0;
    }
  }

  /* Short screens */
  @media (max-height: 600px) {
    .display { padding: var(--space-sm) var(--space-md); }
    .display-value { font-size: 36px; }
    .key { padding: var(--space-sm) 0; }
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="header">
    <span class="header-title">Calculator</span>

  </div>

  <div class="display">
    <div class="display-expression" id="expression"></div>
    <div class="display-value" id="displayValue">0</div>
  </div>

  <div class="keypad" id="keypad">
    <button class="key key-fn" data-action="clear">AC</button>
    <button class="key key-fn" data-action="negate">+/−</button>
    <button class="key key-fn" data-action="percent">%</button>
    <button class="key key-op" data-action="op" data-op="÷">÷</button>

    <button class="key" data-action="digit" data-digit="7">7</button>
    <button class="key" data-action="digit" data-digit="8">8</button>
    <button class="key" data-action="digit" data-digit="9">9</button>
    <button class="key key-op" data-action="op" data-op="×">×</button>

    <button class="key" data-action="digit" data-digit="4">4</button>
    <button class="key" data-action="digit" data-digit="5">5</button>
    <button class="key" data-action="digit" data-digit="6">6</button>
    <button class="key key-op" data-action="op" data-op="−">−</button>

    <button class="key" data-action="digit" data-digit="1">1</button>
    <button class="key" data-action="digit" data-digit="2">2</button>
    <button class="key" data-action="digit" data-digit="3">3</button>
    <button class="key key-op" data-action="op" data-op="+">+</button>

    <button class="key key-zero" data-action="digit" data-digit="0">0</button>
    <button class="key key-dot" data-action="decimal">.</button>
    <button class="key key-eq" data-action="equals">=</button>
  </div>
</div>

<script>
(function() {
  const displayValue = document.getElementById('displayValue');
  const expression = document.getElementById('expression');
  const keypad = document.getElementById('keypad');

  let current = '0';
  let previous = null;
  let operator = null;
  let resetNext = false;
  let lastExpression = '';

  function formatNumber(str) {
    if (str === 'Error') return str;
    const num = parseFloat(str);
    if (isNaN(num)) return '0';
    if (str.includes('.') && str.endsWith('.')) {
      const parts = str.split('.');
      return Number(parts[0]).toLocaleString('en-US') + '.';
    }
    if (str.includes('.')) {
      const parts = str.split('.');
      const trailingZeros = parts[1].length - parts[1].replace(/0+$/, '').length;
      const formatted = Number(parts[0]).toLocaleString('en-US');
      if (parts[1] === '0'.repeat(parts[1].length)) {
        return formatted + '.' + parts[1];
      }
      const decPart = parts[1].replace(/0+$/, '');
      return formatted + '.' + decPart + '0'.repeat(trailingZeros);
    }
    return Number(str).toLocaleString('en-US');
  }

  function updateDisplay() {
    const formatted = formatNumber(current);
    displayValue.textContent = formatted;

    const len = formatted.replace(/,/g, '').length;
    displayValue.className = 'display-value';
    if (len > 12) displayValue.classList.add('shrink-3');
    else if (len > 9) displayValue.classList.add('shrink-2');
    else if (len > 7) displayValue.classList.add('shrink-1');

    expression.textContent = lastExpression;

    const clearBtn = keypad.querySelector('[data-action="clear"]');
    clearBtn.textContent = current === '0' && !previous ? 'AC' : 'C';

    keypad.querySelectorAll('.key-op').forEach(btn => {
      btn.classList.toggle('active', resetNext && btn.dataset.op === operator);
    });
  }

  function calculate(a, op, b) {
    const numA = parseFloat(a);
    const numB = parseFloat(b);
    switch (op) {
      case '+': return numA + numB;
      case '−': return numA - numB;
      case '×': return numA * numB;
      case '÷': return numB === 0 ? 'Error' : numA / numB;
      default: return numB;
    }
  }

  function resultToString(result) {
    if (result === 'Error') return 'Error';
    if (!isFinite(result)) return 'Error';
    return parseFloat(result.toPrecision(12)).toString();
  }

  function handleDigit(digit) {
    if (current === 'Error') current = '0';
    if (resetNext) {
      current = digit;
      resetNext = false;
    } else {
      if (current === '0' && digit !== '0') {
        current = digit;
      } else if (current === '0' && digit === '0') {
        // stay at 0
      } else {
        if (current.replace(/[^0-9]/g, '').length >= 15) return;
        current = current + digit;
      }
    }
    updateDisplay();
  }

  function handleDecimal() {
    if (resetNext) {
      current = '0.';
      resetNext = false;
    } else if (!current.includes('.')) {
      current = current + '.';
    }
    updateDisplay();
  }

  function handleOperator(op) {
    if (current === 'Error') {
      current = '0';
      previous = null;
      operator = null;
    }
    if (previous !== null && !resetNext) {
      const result = calculate(previous, operator, current);
      const resultStr = resultToString(result);
      lastExpression = formatNumber(previous) + ' ' + operator + ' ' + formatNumber(current);
      current = resultStr;
      previous = resultStr === 'Error' ? null : resultStr;
    } else {
      previous = current;
    }
    operator = op;
    resetNext = true;
    updateDisplay();
  }

  function handleEquals() {
    if (previous === null || operator === null) return;
    if (current === 'Error') return;
    const result = calculate(previous, operator, current);
    const resultStr = resultToString(result);
    lastExpression = formatNumber(previous) + ' ' + operator + ' ' + formatNumber(current) + ' =';
    current = resultStr;
    previous = null;
    operator = null;
    resetNext = true;
    updateDisplay();
  }

  function handleClear() {
    if (current !== '0' || resetNext) {
      current = '0';
      resetNext = false;
    } else {
      previous = null;
      operator = null;
      lastExpression = '';
    }
    updateDisplay();
  }

  function handleNegate() {
    if (current === '0' || current === 'Error') return;
    if (current.startsWith('-')) {
      current = current.slice(1);
    } else {
      current = '-' + current;
    }
    updateDisplay();
  }

  function handlePercent() {
    if (current === 'Error') return;
    const num = parseFloat(current) / 100;
    current = resultToString(num);
    updateDisplay();
  }

  // Ripple effect
  function createRipple(btn, x, y) {
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (x - rect.left - size / 2) + 'px';
    ripple.style.top = (y - rect.top - size / 2) + 'px';
    btn.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  }

  // Event delegation
  keypad.addEventListener('pointerdown', (e) => {
    const btn = e.target.closest('.key');
    if (!btn) return;
    e.preventDefault();

    createRipple(btn, e.clientX, e.clientY);

    const action = btn.dataset.action;
    switch (action) {
      case 'digit': handleDigit(btn.dataset.digit); break;
      case 'decimal': handleDecimal(); break;
      case 'op': handleOperator(btn.dataset.op); break;
      case 'equals': handleEquals(); break;
      case 'clear': handleClear(); break;
      case 'negate': handleNegate(); break;
      case 'percent': handlePercent(); break;
    }
  });

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') handleDigit(e.key);
    else if (e.key === '.') handleDecimal();
    else if (e.key === '+') handleOperator('+');
    else if (e.key === '-') handleOperator('−');
    else if (e.key === '*') handleOperator('×');
    else if (e.key === '/') { e.preventDefault(); handleOperator('÷'); }
    else if (e.key === 'Enter' || e.key === '=') handleEquals();
    else if (e.key === 'Escape') handleClear();
    else if (e.key === 'Backspace') {
      if (current.length > 1 && !resetNext) {
        current = current.slice(0, -1);
      } else {
        current = '0';
      }
      updateDisplay();
    }
    else if (e.key === '%') handlePercent();
  });

  updateDisplay();
})();
</script>
</body>
</html>
